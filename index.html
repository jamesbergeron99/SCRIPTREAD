<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRANK | Script Reader</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { font-family: 'Space+Mono', monospace; background-color: #f3f4f6; }
        .black-border { border: 4px solid black; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const FrankApp = () => {
            const [status, setStatus] = useState("SYSTEM ONLINE");
            const [segments, setSegments] = useState([]);
            
            // Your Inworld Key
            const API_KEY = "NDJKcTE4NWZnTG8wOW9Gd3BVWWhhTW9pWlU4dTJ3NU46NE8wenZzV2drTjhRRjlJZVl6aldhZ0lWS0VCYlpFckl5RWJ1a2tTd3Fwb2pVT1BGMGN2OVg4TERtQ1dHWFZ2Yw==";

            const handleFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setStatus("SCANNING: " + file.name.toUpperCase());
                setSegments([{text: "SCRIPT DETECTED. READY TO PROCESS."}]);
            };

            return (
                <div className="min-h-screen flex flex-col bg-white text-black font-mono">
                    {/* Header */}
                    <header className="p-6 border-b-4 border-black flex justify-between items-center">
                        <div>
                            <h1 className="text-3xl font-black uppercase tracking-tighter">Frank Reader</h1>
                            <p className="text-[10px] font-bold text-gray-400">BUILD_V1_STABLE</p>
                        </div>
                        <label className="bg-black text-white px-8 py-3 cursor-pointer font-bold uppercase text-sm border-2 border-black hover:bg-white hover:text-black transition-all">
                            Load Script (PDF)
                            <input type="file" className="hidden" accept=".pdf" onChange={handleFile} />
                        </label>
                    </header>

                    {/* Main Content Area */}
                    <div className="flex-1 flex">
                        {/* Sidebar */}
                        <aside className="w-64 border-r-4 border-black bg-gray-50 p-6">
                            <h2 className="font-black uppercase text-xs mb-4">Cast Assignment</h2>
                            <div className="p-4 border-2 border-black bg-white">
                                <p className="text-[9px] font-black text-gray-400 uppercase">Narrator</p>
                                <p className="font-bold">Selene</p>
                            </div>
                        </aside>

                        {/* Script Display */}
                        <main className="flex-1 p-12">
                            {segments.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center border-4 border-dashed border-gray-200">
                                    <p className="font-black text-gray-300 tracking-widest uppercase">No Script Loaded_</p>
                                </div>
                            ) : (
                                segments.map((s, i) => (
                                    <div key={i} className="p-10 border-4 border-black bg-white shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
                                        <p className="font-black text-2xl uppercase tracking-tighter">{s.text}</p>
                                    </div>
                                ))
                            )}
                        </main>
                    </div>

                    {/* Footer Status Bar */}
                    <footer className="bg-black text-white p-2 px-6 text-[10px] font-bold flex justify-between uppercase">
                        <span>Status: {status}</span>
                        <span>Bergeron Creative Labs</span>
                    </footer>
                </div>
            );
        };

        // Initialize the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FrankApp />);
    </script>
</body>
</html>
