<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptread</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=BAAK4FNNEoRhK_jriVX-V3QO-iWVuGEuUdAmvgVHX6pluidxESAwHaGB_fm7WGrOSxe-6VcmE6xZvnvdjU&components=hosted-buttons&disable-funding=venmo&currency=CAD"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { font-family: 'Space+Mono', monospace; overflow: hidden; height: 100vh; background: #fff; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: black; }
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22black%22%20stroke-width%3D%223%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpath%20d%3D%22M6%209l6%206%206-6%22%3E%3C%2Fpath%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 0.75rem center; }
        .paywall-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 10000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const INWORLD_VOICES = {
            narrators: [{ id: "Selene", name: "Selene (Default)" }, { id: "default-oglabcjnetcklcq7rghmbw__frank2", name: "Frank" }],
            female: [{ id: "Abby", name: "Abby" }, { id: "Amina", name: "Amina" }, { id: "Anjali", name: "Anjali" }, { id: "Aoede", name: "Aoede" }, { id: "Ashley", name: "Ashley" }, { id: "Bianca", name: "Bianca" }, { id: "Celeste", name: "Celeste" }, { id: "Chloe", name: "Chloe" }, { id: "Claire", name: "Claire" }, { id: "Darlene", name: "Darlene" }, { id: "Deborah", name: "Deborah" }, { id: "Eleanor", name: "Eleanor" }, { id: "Evelyn", name: "Evelyn" }, { id: "Hana", name: "Hana" }, { id: "Jessica", name: "Jessica" }, { id: "Kelsey", name: "Kelsey" }, { id: "Lauren", name: "Lauren" }, { id: "Leda", name: "Leda" }, { id: "Loretta", name: "Loretta" }, { id: "Luna", name: "Luna" }, { id: "Marlene", name: "Marlene" }, { id: "Mia", name: "Mia" }, { id: "Miranda", name: "Miranda" }, { id: "Nadia", name: "Nadia" }, { id: "Naomi", name: "Naomi" }, { id: "Olivia", name: "Olivia" }, { id: "Pippa", name: "Pippa" }, { id: "Pixie", name: "Pixie" }, { id: "Riley", name: "Riley" }, { id: "Saanvi", name: "Saanvi" }, { id: "Sarah", name: "Sarah" }, { id: "Serena", name: "Serena" }, { id: "Sophie", name: "Sophie" }, { id: "Tessa", name: "Tessa" }, { id: "Veronica", name: "Veronica" }, { id: "Victoria", name: "Victoria" }],
            male: [{ id: "Alex", name: "Alex" }, { id: "Arjun", name: "Arjun" }, { id: "Avery", name: "Avery" }, { id: "Blake", name: "Blake" }, { id: "Brandon", name: "Brandon" }, { id: "Brian", name: "Brian" }, { id: "Callum", name: "Callum" }, { id: "Carter", name: "Carter" }, { id: "Cedric", name: "Cedric" }, { id: "Clive", name: "Clive" }, { id: "Conrad", name: "Conrad" }, { id: "Damon", name: "Damon" }, { id: "Dennis", name: "Dennis" }, { id: "Derek", name: "Derek" }, { id: "Dominus", name: "Dominus" }, { id: "Duncan", name: "Duncan" }, { id: "Edward", name: "Edward" }, { id: "Elliott", name: "Elliott" }, { id: "Ethan", name: "Ethan" }, { id: "Evan", name: "Evan" }, { id: "Felix", name: "Felix" }, { id: "Gareth", name: "Gareth" }, { id: "Graham", name: "Graham" }, { id: "Hamish", name: "Hamish" }, { id: "Hank", name: "Hank" }, { id: "James", name: "James" }, { id: "Jason", name: "Jason" }, { id: "Jonah", name: "Jonah" }, { id: "Levi", name: "Levi" }, { id: "Liam", name: "Liam" }, { id: "Lucian", name: "Lucian" }, { id: "Malcolm", name: "Malcolm" }, { id: "Marcus", name: "Marcus" }, { id: "Mark", name: "Mark" }, { id: "Nate", name: "Nate" }, { id: "Oliver", name: "Oliver" }, { id: "Reed", name: "Reed" }, { id: "Rupert", name: "Rupert" }, { id: "Sebastian", name: "Sebastian" }, { id: "Simon", name: "Simon" }, { id: "Timothy", name: "Timothy" }, { id: "Trevor", name: "Trevor" }, { id: "Tristan", name: "Tristan" }, { id: "Tyler", name: "Tyler" }, { id: "Victor", name: "Victor" }, { id: "Vinny", name: "Vinny" }]
        };

        const Scriptread = () => {
            const [segments, setSegments] = useState([]);
            const [characters, setCharacters] = useState([]);
            const [voiceMap, setVoiceMap] = useState({ Narrator: "Selene" });
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentIdx, setCurrentIdx] = useState(-1);
            const [isUnlocked, setIsUnlocked] = useState(false);
            const [totalSeconds, setTotalSeconds] = useState(0);
            const [showPaywall, setShowPaywall] = useState(false);
            const [unlockCode, setUnlockCode] = useState("");
            const [status, setStatus] = useState("READY");

            const audioContext = useRef(null);
            const activeSource = useRef(null);
            const TRIAL_LIMIT = 30;
            const API_KEY = window.REACT_APP_INWORLD_KEY || "NDJKcTE4NWZnTG8wOW9Gd3BVWWhhTW9pWlU4dTJ3NU46NE8wenZzV2drTjhRRjlJZVl6aldhZ0lWS0VCYlpFckl5RWJ1a2tTd3Fwb2pVT1BGMGN2OVg4TERtQ1dHWFZ2Yw==";

            useEffect(() => {
                window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
                audioContext.current = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            }, []);

            // MONITOR FOR TRIAL END
            useEffect(() => {
                if (!isUnlocked && totalSeconds >= TRIAL_LIMIT) {
                    stopAudio();
                    setShowPaywall(true);
                }
            }, [totalSeconds, isUnlocked]);

            // PAYPAL INITIALIZER
            useEffect(() => {
                if (showPaywall && window.paypal) {
                    document.getElementById('paypal-btn').innerHTML = '';
                    window.paypal.HostedButtons({
                        hostedButtonId: "BAAK4FNNEoRhK_jriVX-V3QO-iWVuGEuUdAmvgVHX6pluidxESAwHaGB_fm7WGrOSxe-6VcmE6xZvnvdjU",
                        onApprove: () => { setIsUnlocked(true); setShowPaywall(false); }
                    }).render("#paypal-btn");
                }
            }, [showPaywall]);

            const stopAudio = () => {
                setIsPlaying(false);
                if (activeSource.current) {
                    activeSource.current.onended = null;
                    try { activeSource.current.stop(); } catch(e) {}
                    activeSource.current = null;
                }
            };

            const parseScript = (lines) => {
                const blocks = [];
                let currentItem = null;
                const foundChars = new Set();

                lines.forEach(line => {
                    const text = line.text.trim();
                    const x = line.x;
                    if (!text || text.match(/^\d+$/) || text.match(/^PAGE\s+\d+$/i)) return;

                    const isChar = x > 180 && text === text.toUpperCase() && text.length < 30;

                    if (isChar) {
                        const name = text.replace(/\([^)]*\)/g, "").trim();
                        foundChars.add(name);
                        currentItem = { type: 'dialogue', character: name, text: "" };
                        blocks.push(currentItem);
                    } else if (currentItem && currentItem.type === 'dialogue' && x > 120 && x < 350) {
                        // Stitch lines together to prevent mid-sentence pauses
                        currentItem.text += (currentItem.text ? " " : "") + text;
                    } else {
                        // If Narrator block already exists and is the last item, stitch it
                        if (blocks.length > 0 && blocks[blocks.length-1].type === 'narrator') {
                            blocks[blocks.length-1].text += " " + text;
                        } else {
                            currentItem = { type: 'narrator', text };
                            blocks.push(currentItem);
                        }
                    }
                });

                setCharacters([...foundChars].sort());
                setSegments(blocks);
            };

            const playSegment = async (index) => {
                if (index >= segments.length || !isPlaying || (!isUnlocked && totalSeconds >= TRIAL_LIMIT)) {
                    if (index >= segments.length) setIsPlaying(false);
                    return;
                }

                setCurrentIdx(index);
                const seg = segments[index];
                const voice = seg.type === 'narrator' ? voiceMap.Narrator : (voiceMap[seg.character] || "Abby");
                
                try {
                    const response = await fetch("https://api.inworld.ai/tts/v1/voice", {
                        method: "POST",
                        headers: { "Authorization": `Basic ${API_KEY}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ text: seg.text, voiceId: voice, modelId: "inworld-tts-1.5-max" })
                    });
                    const data = await response.json();
                    const buffer = await audioContext.current.decodeAudioData(new Uint8Array(atob(data.audioContent).split("").map(c => c.charCodeAt(0))).buffer);

                    const source = audioContext.current.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioContext.current.destination);
                    source.onended = () => {
                        setTotalSeconds(prev => prev + buffer.duration);
                        if (isPlaying) playSegment(index + 1);
                    };
                    activeSource.current = source;
                    source.start();
                } catch (e) { if(isPlaying) playSegment(index + 1); }
            };

            useEffect(() => {
                if (isPlaying) playSegment(currentIdx === -1 ? 0 : currentIdx);
                else stopAudio();
            }, [isPlaying]);

            const VoiceList = () => (
                <>
                    <optgroup label="Narrators">{INWORLD_VOICES.narrators.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}</optgroup>
                    <optgroup label="Female">{INWORLD_VOICES.female.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}</optgroup>
                    <optgroup label="Male">{INWORLD_VOICES.male.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}</optgroup>
                </>
            );

            return (
                <div className="flex flex-col h-screen relative">
                    {showPaywall && (
                        <div className="paywall-overlay">
                            <div className="max-w-md w-full border-[8px] border-black bg-white p-8 shadow-[15px_15px_0px_0px_rgba(0,0,0,1)] text-center">
                                <h2 className="text-3xl font-black uppercase mb-4 italic italic tracking-tighter">Like what you hear?</h2>
                                <p className="font-bold text-sm mb-8 leading-tight uppercase">Please contribute to the cost of these excellent professional voices to unlock the full script.</p>
                                <div id="paypal-btn" className="mb-6 min-h-[50px]"></div>
                                <div className="border-t-2 border-black pt-4 flex gap-2">
                                    <input type="password" value={unlockCode} onChange={(e) => setUnlockCode(e.target.value)} placeholder="CODE" className="flex-1 border-4 border-black p-2 text-xs font-black outline-none uppercase" />
                                    <button onClick={() => unlockCode.toLowerCase() === 'frank2026' && (setIsUnlocked(true), setShowPaywall(false))} className="bg-black text-white px-4 font-black text-xs uppercase">Unlock</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="border-b-4 border-black p-4 flex justify-between items-center bg-white shrink-0">
                        <h1 className="text-2xl font-black uppercase tracking-tighter italic">Scriptread</h1>
                        <div className="flex gap-4">
                            {!isUnlocked && <div className="text-[10px] font-black px-2 py-2 bg-yellow-400 border-2 border-black uppercase tracking-tighter">Trial: {Math.round(totalSeconds)}s / 30s</div>}
                            <label className="px-4 py-2 bg-black text-white font-black text-xs cursor-pointer border-2 border-black uppercase">Load PDF <input type="file" className="hidden" accept=".pdf" onChange={(e) => {
                                const file = e.target.files[0];
                                if (!file) return;
                                stopAudio();
                                const reader = new FileReader();
                                reader.onload = async () => {
                                    const pdf = await window.pdfjsLib.getDocument({ data: reader.result }).promise;
                                    let positionalLines = [];
                                    for (let i = 1; i <= pdf.numPages; i++) {
                                        const page = await pdf.getPage(i);
                                        const content = await page.getTextContent();
                                        content.items.forEach(item => positionalLines.push({ text: item.str, x: item.transform[4] }));
                                    }
                                    parseScript(positionalLines);
                                    setCurrentIdx(-1);
                                    setTotalSeconds(0);
                                    setStatus("LOADED");
                                };
                                reader.readAsArrayBuffer(file);
                            }} /></label>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        <aside className="w-64 border-r-4 border-black bg-gray-50 overflow-y-auto shrink-0 custom-scrollbar">
                            <div className="p-2 bg-black text-white font-black text-[10px] uppercase italic text-center">Cast</div>
                            <div className="p-4 space-y-4">
                                <div className="p-2 border-2 border-black bg-white">
                                    <p className="text-[9px] font-black text-gray-400 uppercase">Narrator</p>
                                    <select value={voiceMap.Narrator} onChange={(e) => setVoiceMap({...voiceMap, Narrator: e.target.value})} className="w-full text-[10px] font-bold outline-none"><VoiceList /></select>
                                </div>
                                {characters.map(char => (
                                    <div key={char} className="p-2 border-2 border-black bg-white">
                                        <p className="text-[9px] font-black uppercase">{char}</p>
                                        <select value={voiceMap[char] || "Abby"} onChange={(e) => setVoiceMap({...voiceMap, [char]: e.target.value})} className="w-full text-[10px] font-bold outline-none"><VoiceList /></select>
                                    </div>
                                ))}
                            </div>
                        </aside>

                        <main className="flex-1 p-8 overflow-y-auto bg-white custom-scrollbar pb-32">
                            {segments.map((seg, i) => (
                                <div key={i} className={`p-6 border-2 mb-4 transition-all ${currentIdx === i ? 'bg-black text-white scale-[1.01]' : 'border-black opacity-30'}`}>
                                    {seg.type === 'dialogue' && <p className="text-[10px] font-black uppercase mb-1">{seg.character}</p>}
                                    <p className="text-sm font-bold uppercase leading-tight">{seg.text}</p>
                                </div>
                            ))}
                        </main>
                    </div>

                    <footer className="shrink-0 border-t-4 border-black p-6 bg-white flex justify-center items-center gap-10">
                        <button onClick={() => { stopAudio(); setCurrentIdx(Math.max(0, currentIdx - 1)); }}><svg width="32" height="32" viewBox="0 0 24 24" fill="black"><polygon points="11 19 2 12 11 5 11 19"/><polygon points="22 19 13 12 22 5 22 19"/></svg></button>
                        <button onClick={() => { if (audioContext.current.state === 'suspended') audioContext.current.resume(); setIsPlaying(!isPlaying); }} className="bg-black text-white p-5 rounded-full shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-all active:translate-y-1">
                            {isPlaying ? <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> : <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>}
                        </button>
                        <button onClick={() => { stopAudio(); setCurrentIdx(Math.min(segments.length - 1, currentIdx + 1)); }}><svg width="32" height="32" viewBox="0 0 24 24" fill="black"><polygon points="13 19 22 12 13 5 13 19"/><polygon points="2 19 11 12 2 5 2 19"/></svg></button>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<Scriptread />);
    </script>
</body>
</html>
