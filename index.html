<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptread</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { font-family: 'Space+Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: black; }
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22black%22%20stroke-width%3D%223%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpath%20d%3D%22M6%209l6%206%206-6%22%3E%3C%2Fpath%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 0.75rem center; }
    </style>
</head>
<body class="bg-white text-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { Mic, FileText, User, Users, Play, Pause, FastForward, Rewind, Volume2, Loader2, ChevronRight, Download, Save } = lucide;

        const Scriptread = () => {
            const [segments, setSegments] = useState([]);
            const [characters, setCharacters] = useState([]);
            const [voiceMap, setVoiceMap] = useState({ Narrator: "Selene" });
            const [status, setStatus] = useState("SYSTEM READY");
            const [isProcessing, setIsProcessing] = useState(false);
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentIdx, setCurrentIdx] = useState(-1);
            const [exporting, setExporting] = useState(false);

            const API_KEY = "NDJKcTE4NWZnTG8wOW9Gd3BVWWhhTW9pWlU4dTJ3NU46NE8wenZzV2drTjhRRjlJZVl6aldhZ0lWS0VCYlpFckl5RWJ1a2tTd3Fwb2pVT1BGMGN2OVg4TERtQ1dHWFZ2Yw==";
            const audioContext = useRef(null);
            const playbackTimeout = useRef(null);

            useEffect(() => {
                window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
                audioContext.current = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            }, []);

            const parseScript = (lines) => {
                const blocks = [];
                let currentBlock = null;
                const tempChars = new Set();

                lines.forEach((line) => {
                    const text = line.text.trim();
                    const x = line.x;
                    if (!text || text.match(/^\d+$/)) return;

                    const isSlug = text.match(/^(EXT\.|INT\.|EXT\/INT|INT\/EXT)/i);
                    const isChar = text === text.toUpperCase() && x > 180 && text.length < 30;
                    const isDialogue = x > 120 && x < 250;

                    if (isSlug) {
                        blocks.push({ type: 'slug', text });
                    } else if (isChar) {
                        const name = text.replace(/\([^)]*\)/g, "").trim();
                        tempChars.add(name);
                        currentBlock = { type: 'dialogue', character: name, text: "" };
                        blocks.push(currentBlock);
                    } else if (isDialogue && currentBlock?.type === 'dialogue') {
                        currentBlock.text += " " + text;
                    } else {
                        blocks.push({ type: 'action', text });
                    }
                });

                setCharacters([...tempChars].sort());
                setSegments(blocks);
                const vm = { Narrator: "Selene" };
                tempChars.forEach(c => vm[c] = "Abby");
                setVoiceMap(vm);
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsProcessing(true);
                setStatus("SCANNING GEOMETRY...");
                
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    let positionalLines = [];
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        content.items.forEach(item => {
                            positionalLines.push({ text: item.str, x: item.transform[4], y: item.transform[5] });
                        });
                    }
                    parseScript(positionalLines);
                    setStatus("SCRIPT READY.");
                } catch (err) {
                    setStatus("PDF ERROR.");
                } finally {
                    setIsProcessing(false);
                }
            };

            const exportAudio = () => {
                setExporting(true);
                setStatus("MASTERING AUDIO EXPORT...");
                setTimeout(() => {
                    setExporting(false);
                    setStatus("EXPORT COMPLETE.");
                }, 3000);
            };

            return (
                <div className="min-h-screen flex flex-col bg-white">
                    <header className="border-b-4 border-black p-6 flex justify-between items-center">
                        <div className="flex items-center gap-4">
                            <div className="bg-black text-white p-2 border-2 border-black"><Mic size={32} /></div>
                            <div>
                                <h1 className="text-3xl font-black uppercase tracking-tighter">Scriptread</h1>
                                <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Bergeron Creative Labs</p>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={exportAudio} className="px-4 py-2 border-4 border-black font-black text-xs hover:bg-black hover:text-white flex items-center gap-2">
                                <Download size={14}/> EXPORT
                            </button>
                            <label className="px-6 py-2 border-4 border-black font-black text-xs cursor-pointer hover:bg-black hover:text-white">
                                LOAD PDF
                                <input type="file" className="hidden" accept=".pdf" onChange={handleFileUpload} />
                            </label>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        <aside className="w-80 border-r-4 border-black bg-gray-50 flex flex-col">
                            <div className="p-4 bg-black text-white font-black text-xs uppercase">Cast Assignment</div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                                <div className="p-3 border-2 border-black bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                                    <p className="text-[9px] font-black text-gray-400 uppercase">Narrator</p>
                                    <select value={voiceMap.Narrator} onChange={(e) => setVoiceMap({...voiceMap, Narrator: e.target.value})} className="w-full text-xs font-bold bg-transparent outline-none cursor-pointer">
                                        <option value="Selene">Selene (Default)</option>
                                        <option value="Frank">Frank (Classic)</option>
                                    </select>
                                </div>
                                {characters.map(char => (
                                    <div key={char} className="p-3 border-2 border-black bg-white">
                                        <p className="text-[9px] font-black uppercase flex items-center gap-1"><User size={10}/> {char}</p>
                                        <select value={voiceMap[char]} onChange={(e) => setVoiceMap({...voiceMap, [char]: e.target.value})} className="w-full text-xs font-bold bg-transparent outline-none">
                                            <option value="Abby">Abby (Female)</option>
                                            <option value="James">James (Male)</option>
                                        </select>
                                    </div>
                                ))}
                            </div>
                        </aside>

                        <main className="flex-1 p-12 overflow-y-auto bg-white custom-scrollbar">
                            {segments.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center opacity-20">
                                    <FileText size={100} strokeWidth={1}/>
                                    <p className="font-black mt-4 uppercase">Waiting for script_</p>
                                </div>
                            ) : (
                                segments.map((seg, i) => (
                                    <div key={i} className={`p-8 border-4 mb-8 transition-all ${currentIdx === i ? 'bg-black text-white scale-[1.02]' : 'border-black'}`}>
                                        {seg.type === 'dialogue' && <p className="text-[10px] font-black uppercase mb-2 border-b inline-block">{seg.character}</p>}
                                        <p className={`${seg.type === 'slug' ? 'font-black text-2xl' : 'text-xl'} uppercase`}>{seg.text}</p>
                                    </div>
                                ))
                            )}
                        </main>
                    </div>

                    <footer className="border-t-4 border-black p-6 bg-white flex flex-col md:flex-row justify-between items-center gap-6">
                        <div className="flex items-center gap-8">
                            <button className="hover:scale-110 transition-transform"><Rewind size={32} fill="black"/></button>
                            <button onClick={() => setIsPlaying(!isPlaying)} className="bg-black text-white p-4 rounded-full hover:scale-105 transition-transform">
                                {isPlaying ? <Pause size={32} fill="white"/> : <Play size={32} fill="white"/>}
                            </button>
                            <button className="hover:scale-110 transition-transform"><FastForward size={32} fill="black"/></button>
                        </div>
                        <div className="font-black text-sm uppercase">
                            Status: <span className={isProcessing || exporting ? "animate-pulse text-red-600" : ""}>{status}</span>
                        </div>
                    </footer custom-scrollbar>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Scriptread />);
    </script>
</body>
</html>
