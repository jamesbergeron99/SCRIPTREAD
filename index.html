<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptread | Professional</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { font-family: 'Space+Mono', monospace; overflow: hidden; height: 100vh; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: black; }
        .paywall-overlay { background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="bg-white text-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ... [Insert the same INWORLD_VOICES list from previous version here] ...

        const Scriptread = () => {
            const [segments, setSegments] = useState([]);
            const [isUnlocked, setIsUnlocked] = useState(false);
            const [totalSecondsRead, setTotalSecondsRead] = useState(0);
            const [showPaywall, setShowPaywall] = useState(false);
            const [status, setStatus] = useState("SYSTEM READY");
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentIdx, setCurrentIdx] = useState(-1);
            
            const audioContext = useRef(null);
            const activeSource = useRef(null);
            const TRIAL_LIMIT = 30; // 30 Seconds

            // ... [Insert existing handleFileUpload and fetchAudio functions] ...

            const playSegment = async (index) => {
                if (index >= segments.length || !isPlaying) return;

                // PAYWALL CHECK
                if (!isUnlocked && totalSecondsRead >= TRIAL_LIMIT) {
                    setIsPlaying(false);
                    setShowPaywall(true);
                    setStatus("TRIAL ENDED");
                    return;
                }

                setCurrentIdx(index);
                const seg = segments[index];
                const voice = seg.type === 'narrator' ? voiceMap.Narrator : voiceMap[seg.character];
                
                try {
                    const buffer = await fetchAudio(cleanText(seg.text), voice);
                    
                    // Track time
                    if (!isUnlocked) {
                        setTotalSecondsRead(prev => prev + buffer.duration);
                    }

                    const source = audioContext.current.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioContext.current.destination);
                    source.onended = () => { if (isPlaying) playSegment(index + 1); };
                    activeSource.current = source;
                    source.start();
                } catch (e) { playSegment(index + 1); }
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden relative">
                    {/* PAYWALL MODAL */}
                    {showPaywall && (
                        <div className="fixed inset-0 z-50 paywall-overlay flex items-center justify-center p-6">
                            <div className="max-w-md w-full border-8 border-black bg-white p-8 shadow-[20px_20px_0px_0px_rgba(0,0,0,1)]">
                                <h2 className="text-4xl font-black uppercase mb-4 tracking-tighter">Trial Ended</h2>
                                <p className="font-bold mb-6 text-sm leading-relaxed">You've reached the 30-second free limit. Purchase a full license to unlock unlimited rendering and high-res exports for this script.</p>
                                
                                <div className="space-y-3">
                                    <a href="YOUR_PAYPAL_OR_STRIPE_LINK" target="_blank" className="block w-full bg-black text-white text-center py-4 font-black uppercase hover:invert transition-all">
                                        Unlock Full Script ($9.99)
                                    </a>
                                    <button onClick={() => setShowPaywall(false)} className="block w-full border-4 border-black text-center py-2 font-black uppercase text-[10px]">
                                        Close
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="border-b-4 border-black p-4 flex justify-between items-center bg-white z-10">
                        <h1 className="text-2xl font-black uppercase">Scriptread</h1>
                        <div className="flex items-center gap-4">
                            {!isUnlocked && (
                                <div className="text-[10px] font-black border-2 border-black px-2 py-1 bg-yellow-300">
                                    FREE TRIAL: {Math.round(totalSecondsRead)}s / {TRIAL_LIMIT}s
                                </div>
                            )}
                            <label className="px-4 py-2 bg-black text-white font-black text-xs cursor-pointer border-2 border-black">
                                LOAD PDF <input type="file" className="hidden" accept=".pdf" onChange={handleFileUpload} />
                            </label>
                        </div>
                    </header>

                    {/* ... [Main content and footer same as v1.5] ... */}

                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<Scriptread />);
    </script>
</body>
</html>
