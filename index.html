<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRANK | Script Reader</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { font-family: 'Space+Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: black; }
        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23000000%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right .5em top 50%; background-size: .5em auto;
        }
    </style>
</head>
<body class="bg-white text-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        // Access icons from the lucide global object
        const { Mic, Download, FileText, User, Volume2, Loader2, ChevronRight, ChevronDown, Users, Play, Pause } = lucide;

        // Configuration for Voices
        const NARRATOR_VOICE_TAG = "Selene"; 
        const DEFAULT_CHARACTER_VOICE_TAG = "Abby";
        const INWORLD_VOICES = {
            narrators: [
                { id: "Selene", name: "Selene (Default)" },
                { id: "default-oglabcjnetcklcq7rghmbw__frank2", name: "Frank" }
            ],
            female: [{ id: "Abby", name: "Abby" }, { id: "Chloe", name: "Chloe" }, { id: "Tessa", name: "Tessa" }],
            male: [{ id: "James", name: "James" }, { id: "Victor", name: "Victor" }, { id: "Marcus", name: "Marcus" }]
        };

        const MovieScriptTTS = () => {
            const [segments, setSegments] = useState([]);
            const [characters, setCharacters] = useState([]);
            const [voiceMap, setVoiceMap] = useState({ Narrator: NARRATOR_VOICE_TAG });
            const [status, setStatus] = useState("System Ready");
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentSegmentIndex, setCurrentSegmentIndex] = useState(-1);
            const [isProcessing, setIsProcessing] = useState(false);

            // API Key Logic
            const inworldApiKey = "NDJKcTE4NWZnTG8wOW9Gd3BVWWhhTW9pWlU4dTJ3NU46NE8wenZzV2drTjhRRjlJZVl6aldhZ0lWS0VCYlpFckl5RWJ1a2tTd3Fwb2pVT1BGMGN2OVg4TERtQ1dHWFZ2Yw==";

            const audioContext = useRef(null);
            const playbackTimeout = useRef(null);

            useEffect(() => {
                if (window.pdfjsLib) {
                    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
                }
                if (!audioContext.current) {
                    audioContext.current = new (window.AudioContext || window.webkitAudioContext)();
                }
            }, []);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsProcessing(true);
                setStatus("Scanning script geometry...");
                
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    let allText = [];
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        content.items.forEach(item => allText.push({ text: item.str, x: item.transform[4], y: item.transform[5] }));
                    }
                    
                    // Basic parsing for display
                    setSegments([{ type: 'slug', text: "SCRIPT LOADED: " + file.name }]);
                    setStatus("Ready to Play.");
                } catch (err) {
                    setStatus("Error reading PDF.");
                } finally {
                    setIsProcessing(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col font-mono">
                    <header className="border-b-4 border-black p-6 flex justify-between items-center bg-white">
                        <div className="flex items-center gap-4">
                            <div className="bg-black text-white p-2 border-2 border-black"><Mic size={32} /></div>
                            <div>
                                <h1 className="text-3xl font-black uppercase tracking-tighter">Frank Reader</h1>
                                <p className="text-[10px] font-bold text-neutral-400">BUILD_V1.0_STABLE</p>
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <label className="px-6 py-2 border-4 border-black font-black text-xs cursor-pointer hover:bg-black hover:text-white transition-all">
                                LOAD PDF
                                <input type="file" className="hidden" accept=".pdf" onChange={handleFileUpload} />
                            </label>
                            <button className="px-10 py-2 bg-black text-white font-black text-xs border-4 border-black hover:bg-white hover:text-black transition-all">
                                {isPlaying ? "STOP" : "PLAY"}
                            </button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        <aside className="w-72 border-r-4 border-black bg-neutral-50 p-4 overflow-y-auto">
                            <h2 className="font-black uppercase text-xs mb-4 flex items-center gap-2"><Users size={14}/> Cast</h2>
                            <div className="space-y-4">
                                <div className="p-3 border-2 border-black bg-white">
                                    <p className="text-[9px] font-black text-neutral-400 mb-1">NARRATOR</p>
                                    <select className="w-full text-[10px] font-bold outline-none bg-transparent">
                                        {INWORLD_VOICES.narrators.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                                    </select>
                                </div>
                            </div>
                        </aside>

                        <main className="flex-1 bg-white p-12 overflow-y-auto custom-scrollbar">
                            {segments.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-neutral-200">
                                    <FileText size={80} className="mb-4 opacity-10" />
                                    <p className="font-black tracking-widest uppercase">Drop Script to Start_</p>
                                </div>
                            ) : (
                                segments.map((seg, idx) => (
                                    <div key={idx} className="p-8 border-4 border-black mb-8">
                                        <p className="font-black text-xl uppercase">{seg.text}</p>
                                    </div>
                                ))
                            )}
                        </main>
                    </div>

                    <footer className="bg-black text-white p-2 text-[10px] font-bold px-6 flex justify-between">
                        <span>> STATUS: {status}</span>
                        <span className="opacity-50 tracking-widest uppercase">Bergeron_Creative_Labs</span>
                    </footer>
                </div>
            );
        };

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MovieScriptTTS />);
    </script>
</body>
</html>
