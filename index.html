<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptread</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { font-family: 'Space+Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: black; }
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22black%22%20stroke-width%3D%223%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpath%20d%3D%22M6%209l6%206%206-6%22%3E%3C%2Fpath%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 0.75rem center; }
    </style>
</head>
<body class="bg-white text-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- THE VOICE LIBRARY (All 80+ Tags) ---
        const INWORLD_VOICES = {
            narrators: [
                { id: "Selene", name: "Selene (Default Narrator)" },
                { id: "default-oglabcjnetcklcq7rghmbw__frank2", name: "Frank (Classic Narration)" },
                { id: "Kore", name: "Kore" }, { id: "Charon", name: "Charon" }
            ],
            female: [
                { id: "Abby", name: "Abby" }, { id: "Amina", name: "Amina" }, { id: "Anjali", name: "Anjali" }, { id: "Aoede", name: "Aoede" }, { id: "Ashley", name: "Ashley" }, { id: "Bianca", name: "Bianca" }, { id: "Celeste", name: "Celeste" }, { id: "Chloe", name: "Chloe" }, { id: "Claire", name: "Claire" }, { id: "Darlene", name: "Darlene" }, { id: "Deborah", name: "Deborah" }, { id: "Eleanor", name: "Eleanor" }, { id: "Evelyn", name: "Evelyn" }, { id: "Hana", name: "Hana" }, { id: "Jessica", name: "Jessica" }, { id: "Kelsey", name: "Kelsey" }, { id: "Lauren", name: "Lauren" }, { id: "Leda", name: "Leda" }, { id: "Loretta", name: "Loretta" }, { id: "Luna", name: "Luna" }, { id: "Marlene", name: "Marlene" }, { id: "Mia", name: "Mia" }, { id: "Miranda", name: "Miranda" }, { id: "Nadia", name: "Nadia" }, { id: "Naomi", name: "Naomi" }, { id: "Olivia", name: "Olivia" }, { id: "Pippa", name: "Pippa" }, { id: "Pixie", name: "Pixie" }, { id: "Riley", name: "Riley" }, { id: "Saanvi", name: "Saanvi" }, { id: "Sarah", name: "Sarah" }, { id: "Serena", name: "Serena" }, { id: "Sophie", name: "Sophie" }, { id: "Tessa", name: "Tessa" }, { id: "Veronica", name: "Veronica" }, { id: "Victoria", name: "Victoria" }
            ],
            male: [
                { id: "Alex", name: "Alex" }, { id: "Arjun", name: "Arjun" }, { id: "Avery", name: "Avery" }, { id: "Blake", name: "Blake" }, { id: "Brandon", name: "Brandon" }, { id: "Brian", name: "Brian" }, { id: "Callum", name: "Callum" }, { id: "Carter", name: "Carter" }, { id: "Cedric", name: "Cedric" }, { id: "Clive", name: "Clive" }, { id: "Conrad", name: "Conrad" }, { id: "Damon", name: "Damon" }, { id: "Dennis", name: "Dennis" }, { id: "Derek", name: "Derek" }, { id: "Dominus", name: "Dominus" }, { id: "Duncan", name: "Duncan" }, { id: "Edward", name: "Edward" }, { id: "Elliott", name: "Elliott" }, { id: "Ethan", name: "Ethan" }, { id: "Evan", name: "Evan" }, { id: "Felix", name: "Felix" }, { id: "Gareth", name: "Gareth" }, { id: "Graham", name: "Graham" }, { id: "Hamish", name: "Hamish" }, { id: "Hank", name: "Hank" }, { id: "James", name: "James" }, { id: "Jason", name: "Jason" }, { id: "Jonah", name: "Jonah" }, { id: "Levi", name: "Levi" }, { id: "Liam", name: "Liam" }, { id: "Lucian", name: "Lucian" }, { id: "Malcolm", name: "Malcolm" }, { id: "Marcus", name: "Marcus" }, { id: "Mark", name: "Mark" }, { id: "Nate", name: "Nate" }, { id: "Oliver", name: "Oliver" }, { id: "Reed", name: "Reed" }, { id: "Rupert", name: "Rupert" }, { id: "Sebastian", name: "Sebastian" }, { id: "Simon", name: "Simon" }, { id: "Timothy", name: "Timothy" }, { id: "Trevor", name: "Trevor" }, { id: "Tristan", name: "Tristan" }, { id: "Tyler", name: "Tyler" }, { id: "Victor", name: "Victor" }, { id: "Vinny", name: "Vinny" }
            ]
        };

        const Scriptread = () => {
            const [segments, setSegments] = useState([]);
            const [characters, setCharacters] = useState([]);
            const [voiceMap, setVoiceMap] = useState({ Narrator: "Selene" });
            const [status, setStatus] = useState("SYSTEM READY");
            const [isProcessing, setIsProcessing] = useState(false);
            const [isPlaying, setIsPlaying] = useState(false);
            
            const audioContext = useRef(null);

            useEffect(() => {
                if (window.pdfjsLib) {
                    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
                }
                audioContext.current = new (window.AudioContext || window.webkitAudioContext)();
            }, []);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsProcessing(true);
                setStatus("SCANNING SCRIPT GEOMETRY...");
                
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    let foundLines = [];
                    let charSet = new Set();

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        content.items.forEach(item => {
                            const text = item.str.trim();
                            const x = item.transform[4];
                            if (text && !text.match(/^\d+$/)) {
                                foundLines.push({ text, x });
                                if (text === text.toUpperCase() && x > 180 && text.length < 25) {
                                    charSet.add(text.replace(/\([^)]*\)/g, "").trim());
                                }
                            }
                        });
                    }
                    setCharacters([...charSet].sort());
                    setSegments(foundLines.map(l => ({ text: l.text, type: 'line' })));
                    setStatus("SCRIPT LOADED: " + file.name.toUpperCase());
                } catch (err) {
                    setStatus("LOAD ERROR.");
                } finally { setIsProcessing(false); }
            };

            const VoiceList = () => (
                <>
                    <optgroup label="Narrators">{INWORLD_VOICES.narrators.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}</optgroup>
                    <optgroup label="Female">{INWORLD_VOICES.female.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}</optgroup>
                    <optgroup label="Male">{INWORLD_VOICES.male.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}</optgroup>
                </>
            );

            return (
                <div className="min-h-screen flex flex-col bg-white text-black font-mono">
                    <header className="border-b-4 border-black p-6 flex justify-between items-center bg-white shadow-md">
                        <div className="flex items-center gap-4">
                            <div className="bg-black text-white p-2 border-2 border-black">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                            </div>
                            <h1 className="text-3xl font-black uppercase tracking-tighter">Scriptread</h1>
                        </div>
                        <div className="flex gap-4">
                            <button className="px-6 py-2 border-4 border-black font-black text-xs hover:bg-black hover:text-white uppercase transition-all">Export Audio</button>
                            <label className="px-6 py-2 bg-black text-white border-4 border-black font-black text-xs cursor-pointer hover:bg-white hover:text-black uppercase transition-all">
                                Load PDF <input type="file" className="hidden" accept=".pdf" onChange={handleFileUpload} />
                            </label>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        <aside className="w-80 border-r-4 border-black bg-gray-50 flex flex-col">
                            <div className="p-4 bg-black text-white font-black text-xs uppercase tracking-widest">Cast Assignment</div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                                <div className="p-3 border-2 border-black bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                                    <p className="text-[10px] font-black text-gray-400 uppercase">Narrator</p>
                                    <select value={voiceMap.Narrator} onChange={(e) => setVoiceMap({...voiceMap, Narrator: e.target.value})} className="w-full text-[10px] font-bold outline-none"><VoiceList /></select>
                                </div>
                                {characters.map(char => (
                                    <div key={char} className="p-3 border-2 border-black bg-white">
                                        <p className="text-[10px] font-black uppercase mb-1">{char}</p>
                                        <select className="w-full text-[10px] font-bold border-t border-black pt-1 outline-none"><VoiceList /></select>
                                    </div>
                                ))}
                            </div>
                        </aside>

                        <main className="flex-1 p-12 overflow-y-auto bg-white custom-scrollbar">
                            {segments.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center opacity-10 uppercase font-black tracking-widest">
                                    <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                                    <p className="mt-4">Ready for Script_</p>
                                </div>
                            ) : (
                                segments.map((seg, i) => (
                                    <div key={i} className="p-6 border-4 border-black mb-4 hover:bg-gray-50 transition-colors">
                                        <p className="text-lg font-bold uppercase tracking-tight">{seg.text}</p>
                                    </div>
                                ))
                            )}
                        </main>
                    </div>

                    <footer className="border-t-4 border-black p-6 bg-white flex justify-between items-center">
                        <div className="flex items-center gap-10">
                            <button className="hover:scale-110 transition-all"><svg width="32" height="32" viewBox="0 0 24 24" fill="black"><polygon points="11 19 2 12 11 5 11 19"/><polygon points="22 19 13 12 22 5 22 19"/></svg></button>
                            <button onClick={() => setIsPlaying(!isPlaying)} className="bg-black text-white p-5 rounded-full hover:invert transition-all">
                                {isPlaying ? <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> : <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>}
                            </button>
                            <button className="hover:scale-110 transition-all"><svg width="32" height="32" viewBox="0 0 24 24" fill="black"><polygon points="13 19 22 12 13 5 13 19"/><polygon points="2 19 11 12 2 5 2 19"/></svg></button>
                        </div>
                        <div className="font-black text-sm uppercase flex items-center gap-4">
                            <span className="text-gray-400">Status</span>
                            <span className={isProcessing ? "animate-pulse text-red-600" : ""}>{status}</span>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<Scriptread />);
    </script>
</body>
</html>
